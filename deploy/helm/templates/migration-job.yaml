{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "olp.componentFullname" (dict "root" . "component" "migrate") }}
  labels:
    {{- include "olp.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "olp.selectorLabels" (dict "root" . "component" "migration") | nindent 8 }}
    spec:
      restartPolicy: Never
      # Hook Jobs run before ordinary chart resources, including the chart's
      # ServiceAccount. This job does not call the Kubernetes API.
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "olp.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate"]
          env:
            - name: OLP_DATABASE_MAX_CONNECTIONS
              value: {{ .Values.config.databaseMaxConnections | quote }}
            - name: OLP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ required "config.databaseSecretName is required" .Values.config.databaseSecretName | quote }}
                  key: {{ required "config.databaseSecretKey is required" .Values.config.databaseSecretKey | quote }}
            - name: OLP_VALKEY_URL
              valueFrom:
                secretKeyRef:
                  name: {{ required "config.valkeySecretName is required" .Values.config.valkeySecretName | quote }}
                  key: {{ required "config.valkeySecretKey is required" .Values.config.valkeySecretKey | quote }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
