{{- if .Values.monitoring.enabled }}
{{- $root := . -}}
{{- $gatewayService := include "olp.observabilityServiceFullname" (dict "root" . "component" "gateway") -}}
{{- $controlService := include "olp.observabilityServiceFullname" (dict "root" . "component" "control") -}}
{{- range $componentName := list "gateway" "control" -}}
{{- $component := index $root.Values $componentName -}}
{{- if and $component.enabled $component.service.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "olp.componentFullname" (dict "root" $root "component" $componentName) }}
  {{- if $root.Values.monitoring.namespace }}
  namespace: {{ $root.Values.monitoring.namespace | quote }}
  {{- end }}
  labels:
    {{- include "olp.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $componentName }}
    {{- with $root.Values.monitoring.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "olp.selectorLabels" (dict "root" $root "component" $componentName) | nindent 6 }}
      olp.openllmproxy.dev/observability: "true"
  namespaceSelector:
    matchNames: [{{ $root.Release.Namespace | quote }}]
  targetLabels: [app.kubernetes.io/component]
  endpoints:
    - port: observability
      path: /metrics
      interval: {{ $root.Values.monitoring.interval | quote }}
      scrapeTimeout: {{ $root.Values.monitoring.scrapeTimeout | quote }}
---
{{- end }}
{{- end }}
{{- if .Values.monitoring.rules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "olp.fullname" . }}
  {{- if .Values.monitoring.namespace }}
  namespace: {{ .Values.monitoring.namespace | quote }}
  {{- end }}
  labels:
    {{- include "olp.labels" . | nindent 4 }}
    {{- with .Values.monitoring.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: openllmproxy.rules
      rules:
        - alert: OLPReadinessAbsent
          expr: (min_over_time(olp_ready{namespace={{ .Release.Namespace | quote }},service={{ $gatewayService | quote }}}[5m]) < 1) or (min_over_time(olp_ready{namespace={{ .Release.Namespace | quote }},service={{ $controlService | quote }}}[5m]) < 1) or (min_over_time(up{namespace={{ .Release.Namespace | quote }},service={{ $gatewayService | quote }}}[5m]) < 1) or (min_over_time(up{namespace={{ .Release.Namespace | quote }},service={{ $controlService | quote }}}[5m]) < 1) or (absent_over_time(olp_ready{namespace={{ .Release.Namespace | quote }},service={{ $gatewayService | quote }}}[5m]) == 1) or (absent_over_time(olp_ready{namespace={{ .Release.Namespace | quote }},service={{ $controlService | quote }}}[5m]) == 1)
          for: 5m
          labels: { severity: critical }
          annotations:
            summary: OpenLLMProxy readiness is absent
            description: A gateway or control target has been unready or unavailable for five minutes.
        - alert: OLPRequestMetadataEventsDropped
          expr: increase(olp_request_metadata_events_dropped_total[5m]) > 0
          for: 0m
          labels: { severity: critical }
          annotations:
            summary: OpenLLMProxy dropped metadata events
            description: Usage and cost completeness is degraded; preserve stream state and reconcile the affected interval.
        - alert: OLPRequestMetadataEventsAbandoned
          expr: increase(olp_request_metadata_events_abandoned_total[5m]) > 0
          for: 0m
          labels: { severity: critical }
          annotations:
            summary: OpenLLMProxy abandoned accepted metadata events
            description: A shutdown or writer failure abandoned accepted events and requires reconciliation.
        - alert: OLPRequestMetadataPersistenceUnavailable
          expr: min_over_time(olp_request_metadata_persistence_available[5m]) == 0
          for: 5m
          labels: { severity: critical }
          annotations:
            summary: OpenLLMProxy request metadata persistence is unavailable
            description: Metadata delivery has remained unavailable for five minutes.
        - alert: OLPRequestMetadataBacklogHigh
          expr: olp_request_metadata_events_pending > {{ .Values.monitoring.rules.requestMetadataPendingThreshold }}
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: OpenLLMProxy request metadata backlog is sustained
            description: The local metadata backlog has remained above the configured threshold.
        - alert: OLPRequestMetadataConsumerBacklogHigh
          expr: (olp_request_metadata_consumer_pending_events + olp_request_metadata_consumer_lag_events) > {{ .Values.monitoring.rules.requestMetadataPendingThreshold }}
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: OpenLLMProxy request metadata consumer backlog is sustained
            description: Delivered or undelivered Stream events have remained above the configured threshold.
        - alert: OLPDistributedLimiterUnavailable
          expr: min_over_time(olp_distributed_limiter_available[5m]) == 0
          for: 5m
          labels: { severity: critical }
          annotations:
            summary: OpenLLMProxy distributed limiter is unavailable
            description: Hard-limited keys fail closed while Valkey-backed reservations are unavailable.
        - alert: OLPRuntimeGenerationMissing
          expr: max_over_time(olp_runtime_generation[5m]) == 0
          for: 5m
          labels: { severity: critical }
          annotations:
            summary: OpenLLMProxy gateway has no runtime generation
            description: The gateway cannot serve inference until a verified generation is loaded.
{{- end }}
{{- end }}
